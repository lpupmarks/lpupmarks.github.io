<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
   <title>Search</title>
   <style>
      body {
         font-family: Arial, sans-serif;
         background: linear-gradient(135deg, #e6ecf5, #f7f9fc);
         margin: 0;
         padding: 0;
      }
      .container {
         max-width: 700px;
         margin: 40px auto;
         background: white;
         padding: 20px;
         border-radius: 12px;
         box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }
      h2 {
         text-align: center;
         margin-bottom: 20px;
      }
      .searchRow {
         display: flex;
         gap: 10px;
      }
      input {
         flex: 1;
         padding: 12px;
         font-size: 16px;
         border-radius: 8px;
         border: 1px solid #ccc;
      }
      input:focus {
         outline: none;
         border-color: #007bff;
      }
      button {
         padding: 12px 18px;
         border: none;
         border-radius: 8px;
         background: #007bff;
         color: white;
         font-size: 16px;
         cursor: pointer;
      }
      button:hover {
         background: #0056b3;
      }
      #results {
         margin-top: 20px;
      }
      .result {
         background: #f9f9f9;
         margin-bottom: 10px;
         padding: 12px;
         border-radius: 8px;
         border-left: 4px solid #007bff;
         transition: 0.2s;
      }
      .result:hover {
         background: #eef4ff;
      }
   </style>
</head>
<body>
   <div class="container">
      <h2>Search</h2>
      <div class="searchRow">
         <input id="searchBox" placeholder="Type name / id / district / dise">
         <button onclick="search()">Search</button>
      </div>
      <div id="results"></div>
   </div>

   <script>
      let data = [];
      let loaded = false;

      // Show loading message
      document.getElementById("results").innerHTML = "Please wait, loading data...";

      // Load JSON
      fetch("lp_one.json")
         .then(r => r.json())
         .then(j => {
            // Keep only entries that contain "LAKHIMPUR" (case-insensitive)
            data = j.filter(item => 
               item.details && 
               item.details.toUpperCase().includes("LAKHIMPUR")
            );
            
            loaded = true;
            document.getElementById("results").innerHTML = 
               `You can search now.`;
         })
         .catch(err => {
            document.getElementById("results").innerHTML = "Error loading data: " + err;
         });

      // Search on Enter key
      document.getElementById("searchBox")
         .addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
               search();
            }
         });

      function highlight(text, q) {
         if (!q) return text;
         let regex = new RegExp("(" + q + ")", "gi");
         return text.replace(regex, "<span style='background:yellow;font-weight:bold'>$1</span>");
      }

      function search() {
         if (!loaded) {
            document.getElementById("results").innerHTML = "Data still loading, please wait...";
            return;
         }

         let q = document.getElementById("searchBox").value.trim().toLowerCase();
         let out = "";

         if (!q) {
            out = "Please enter a search term";
         } else {
            data.forEach(row => {
               let text = row.details || "";

               if (text.toLowerCase().includes(q)) {
                  // Remove pattern like ". 251xxxxx"
                  let clean = text
                     .replace(/\.\s*251\d+/, "")
                     .trim();

                  // Apply highlighting
                  clean = highlight(clean, q);

                  out += `<div class="result">${clean}</div>`;
               }
            });

            if (out === "") {
               out = "No matching results found in Lakhimpur entries";
            }
         }

         document.getElementById("results").innerHTML = out;
      }
   </script>
</body>
</html>
